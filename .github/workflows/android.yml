name: Android APK erstellen

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Projekt herunterladen
        uses: actions/checkout@v4

      - name: Java 17 einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK einrichten
        uses: android-actions/setup-android@v3

      - name: Android SDK-Pakete installieren
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Gradle 8.7 einrichten
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: APK erstellen
        run: gradle :app:assembleDebug --stacktrace

      - name: APK zum Herunterladen bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: Tagescode-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
